<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Betül Haci | Giriş Yap</title>
  <meta name="description" content="Güvenli giriş sayfası.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="login-page">
    <div class="login-box">
      <div class="logo">Betül Haci</div>
      <p class="subtitle">Öğrenci numaranız ve şifrenizle giriş yapın</p>

      <form id="loginForm" action="php/login.php" method="POST" novalidate>
        <div class="form-group">
          <label for="studentNo">Öğrenci Numarası *</label>
          <input type="text" id="studentNo" name="studentNo" placeholder="b241210060@sakarya.edu.tr">
          <span class="error-msg" id="studentNoErr">Geçerli bir öğrenci e-postası girin.</span>
        </div>

        <div class="form-group">
          <label for="password">Şifre *</label>
          <input type="password" id="password" name="password" placeholder="Şifrenizi girin">
          <span class="error-msg" id="passwordErr">Şifre en az 6 karakter olmalıdır.</span>
        </div>

        <button type="submit" class="btn btn-dark" style="width:100%; margin-top:8px;">
          Giriş Yap →
        </button>

        <div class="alert-box alert-error" id="loginError">
          ❌ Hatalı öğrenci numarası veya şifre!
        </div>

        <div class="alert-box alert-success" id="loginSuccess">
          ✅ Hoş geldiniz! Giriş başarılı. Ana sayfaya yönlendiriliyorsunuz...
        </div>
      </form>

      <p style="margin-top:20px; font-size:13px; color:#888;">
        <a href="index.html" style="color:#b5934a;">← Ana Sayfaya Dön</a>
      </p>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
